<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Wishlist</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
  <h1>Your Wishlist ❤️</h1>
  <button onclick="toggleDarkMode()">🌙</button>
</header>

<div id="wishlist" class="product-grid"></div>
<script>
  function toggleDarkMode() {
  document.body.classList.toggle("dark");

  if (document.body.classList.contains("dark")) {
    localStorage.setItem("theme", "dark");
  } else {
    localStorage.setItem("theme", "light");
  }
}
// Apply theme on page load
window.onload = function () {
  const theme = localStorage.getItem("theme");

  if (theme === "dark") {
    document.body.classList.add("dark");
  }

  // keep your existing functions working
  if (typeof loadProducts === "function") loadProducts();
  if (typeof loadCart === "function") loadCart();
  if (typeof loadWishlist === "function") loadWishlist();
};
const userId = localStorage.getItem("userId");

async function loadWishlist() {
  const res = await fetch(`http://localhost:5000/api/wishlist/${userId}`);
  const data = await res.json();

  let html = "";

  data.forEach(item => {
    html += `
      <div class="card">
        <img src="${item.product.image?.[0] || 'images/book1.jpg'}" 
        onclick="window.location='product.html?id=${item.product._id}'">

        <h3>${item.product.name}</h3>
        <p>₹${item.product.price}</p>

        <button onclick="addToCart('${item.product._id}')">Add to Cart 🛒</button>
        <button onclick="removeItem('${item._id}')">Remove ❌</button>
      </div>
    `;
  });

  document.getElementById("wishlist").innerHTML = html;
}

async function removeItem(id) {
  await fetch(`http://localhost:5000/api/wishlist/${id}`, { method: "DELETE" });
  loadWishlist();
}

// reuse cart function
async function addToCart(productId) {
  await fetch(`http://localhost:5000/api/cart/add`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      userId,
      productId,
      quantity: 1
    })
  });

  alert("Added to Cart 🛒");
}

window.onload = loadWishlist;
</script>

</body>
</html>
