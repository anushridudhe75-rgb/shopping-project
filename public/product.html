<!DOCTYPE html>
<html>
<head>
  <title>Product Details</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- HEADER -->
<div class="cart-header">
  <h2>Book Details 📖</h2>
  <button onclick="toggleDarkMode()">🌙</button>
</div>

<!-- PRODUCT -->
<div id="product" class="product-grid"></div>

<script>
const API = "https://shopping-project-ukyr.onrender.com/api";

// 🌙 DARK MODE
function toggleDarkMode() {
  document.body.classList.toggle("dark");

  if (document.body.classList.contains("dark")) {
    localStorage.setItem("theme", "dark");
  } else {
    localStorage.setItem("theme", "light");
  }
}

// Apply theme
window.onload = function () {
  const theme = localStorage.getItem("theme");
  if (theme === "dark") {
    document.body.classList.add("dark");
  }
};

// ✅ GET PRODUCT ID
const id = new URLSearchParams(window.location.search).get("id");

if (!id) {
  document.getElementById("product").innerHTML =
    "<h2 style='text-align:center;'>No product selected ❌</h2>";
} else {
  loadProduct();
}

// ✅ LOAD PRODUCT
async function loadProduct() {
  try {
    const res = await fetch(`${API}/products`);
    const data = await res.json();

    const p = data.find(x => x._id === id);

    if (!p) {
      document.getElementById("product").innerHTML =
        "<h2 style='text-align:center;'>Product not found ❌</h2>";
      return;
    }

    document.getElementById("product").innerHTML = `
      <div class="card" style="max-width:300px;margin:auto;">
        <img src="${p.image?.[0] || 'images/book1.jpg'}">
        <h2>${p.name}</h2>
        <p>⭐ ${p.rating}</p>
        <p class="price">₹${p.price}</p>

        <button onclick="addToCart('${p._id}')">Add to Cart 🛒</button>
        <button onclick="addToWishlist('${p._id}')">❤️ Wishlist</button>
      </div>
    `;
  } catch (error) {
    document.getElementById("product").innerHTML =
      "<h2 style='text-align:center;'>Error loading product ❌</h2>";
  }
}

// ✅ ADD TO CART
async function addToCart(productId) {
  const userId = localStorage.getItem("userId");

  if (!userId) {
    alert("Please login first ❗");
    return;
  }

  await fetch(`${API}/cart/add`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      userId,
      productId,
      quantity: 1
    })
  });

  alert("Added to Cart ✅");
}

// ✅ ADD TO WISHLIST
async function addToWishlist(productId) {
  const userId = localStorage.getItem("userId");

  if (!userId) {
    alert("Please login first ❗");
    return;
  }

  await fetch(`${API}/wishlist/add`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      userId,
      productId
    })
  });

  alert("Added to Wishlist ❤️");
}
</script>

</body>
</html>
